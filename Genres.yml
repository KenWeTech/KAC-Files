#######################
##     Templates     ##
#######################

templates:
  MAL:
    collection_order: custom
    sync_mode: sync
    sort_title: '!015_<<collection_name>>'
    summary: Animes that are currently <<summary_text>> on MAL.
    url_poster: https://raw.githubusercontent.com/KenWeTech/KAC-Files/main/Covers/<<cover>>
  Anime:
    mal_search:
      genre: <<mal_id>>
      limit: 0
    url_poster: https://raw.githubusercontent.com/KenWeTech/KAC-Files/main/Covers/Genres/<<cover>>
    collection_order: alpha
    collection_mode: hide
    sync_mode: sync
    sort_title: zzz++_<<collection_name>>
    summary: Animes that are in the <<collection_name>> category/genre.
  Special:
    url_poster: https://raw.githubusercontent.com/KenWeTech/KAC-Files/main/Covers/Genres/<<cover>>
    collection_order: alpha
    sync_mode: sync
    sort_title: zzz++_<<collection_name>>
    summary: Animes that are in the <<collection_name>> category/genre.

#############################
##       Collections       ##
#############################

collections:

#############################
##        MAL Lists        ##
#############################

  Top Airing Anime:
    template: {name: MAL, summary_text: "the top airing", cover: "MAL-Top-Airing.jpg"}
    mal_airing: 20

  Top Rated Anime:
    template: {name: MAL, summary_text: "the top rated", cover: "MAL-Top-Rated.jpg"}
    mal_rated: 20

  Most Popular Anime:
    template: {name: MAL, summary_text: "most popular", cover: "MAL-Popular.jpg"}
    mal_popular: 20

  Most Favorited Anime:
    template: {name: MAL, summary_text: "most favorited", cover: "MAL-Favorited.jpg"}
    mal_favorite: 20

